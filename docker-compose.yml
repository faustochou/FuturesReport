services:

  # ── PostgreSQL (persistent user + config storage) ──────────────────────────
  db:
    image: postgres:15-alpine
    container_name: futuresreport-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-futures}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-futures123}
      POSTGRES_DB: ${POSTGRES_DB:-futuresreport}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data survives container rebuilds
    # Expose only on loopback in production; open to 5432 for local dev if needed
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-futures} -d ${POSTGRES_DB:-futuresreport}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Application (frontend + backend in one image) ──────────────────────────
  futuresreport:
    build:
      context: .
      dockerfile: Dockerfile
    image: futuresreport:latest
    container_name: futuresreport
    env_file:
      - .env
    environment:
      # Override / supplement .env so the app reaches the DB container by name
      DATABASE_URL: postgresql://${POSTGRES_USER:-futures}:${POSTGRES_PASSWORD:-futures123}@db:5432/${POSTGRES_DB:-futuresreport}
      USER_DATA_DIR: /data
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - futuresreport-data:/data                    # legacy JSON / task files
      - ./backend/uploads:/app/backend/uploads      # uploaded seed files
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5001/health',timeout=5).getcode()==200 else 1)"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 60s

  # ── Optional: Redis (for Celery task queue in production) ──────────────────
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data

volumes:
  postgres_data:          # PostgreSQL data – never deleted by `docker compose down`
  futuresreport-data:     # Legacy /data volume (tasks, jobs, migration source)
  # redis-data:
