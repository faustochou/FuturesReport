services:
  futuresreport:
    build:
      context: .
      dockerfile: Dockerfile
    image: futuresreport:latest
    container_name: futuresreport
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - futuresreport-data:/data
      - ./backend/uploads:/app/backend/uploads

volumes:
  futuresreport-data:
